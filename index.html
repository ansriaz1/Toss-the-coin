<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Flip PWA</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#74ebd5">
<style>
  body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
    height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    overflow: hidden;
  }

  h1 {
    color: #fff;
    text-shadow: 2px 2px 6px #000;
    margin-bottom: 40px;
  }

  .coin-container {
    perspective: 1000px;
    position: relative;
  }

  .coin {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    position: relative;
    transform-style: preserve-3d;
    cursor: pointer;
    transition: transform 3s cubic-bezier(0.33,1,0.68,1);
  }

  .side {
    position: absolute;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    backface-visibility: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 50px;
    color: #fff;
    border: 4px solid #fff;
    box-shadow: 0 0 25px rgba(255,255,255,0.6), inset 0 0 20px rgba(255,255,255,0.4);
  }

  .heads {
    background: radial-gradient(circle at 30% 30%, #ffd700, #e6c200);
  }

  .tails {
    background: radial-gradient(circle at 70% 70%, #d4af37, #b8860b);
    transform: rotateY(180deg);
  }

  .flip {
    transform: rotateY(1080deg);
  }

  .shine {
    position: absolute;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: linear-gradient(120deg, rgba(255,255,255,0.7), rgba(255,255,255,0) 70%);
    top: 0;
    left: 0;
    transform: rotate(45deg);
    animation: shineMove 2s infinite;
    pointer-events: none;
  }

  @keyframes shineMove {
    0% { transform: rotate(45deg) translateX(-200%); }
    100% { transform: rotate(45deg) translateX(200%); }
  }

  .result {
    margin-top: 30px;
    font-size: 2em;
    color: #fff;
    text-shadow: 1px 1px 5px #000;
    height: 50px;
  }

  .button {
    margin-top: 20px;
    padding: 10px 25px;
    font-size: 1.2em;
    border: none;
    border-radius: 10px;
    background: #ffcc00;
    color: #333;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>

<h1>Flip the Coin!</h1>

<div class="coin-container">
  <div class="coin" id="coin">
    <div class="side heads">🪙</div>
    <div class="side tails">🎯</div>
  </div>
  <div class="shine"></div>
</div>

<div class="result" id="result"></div>
<button class="button" id="flipBtn">Flip Coin</button>

<script>
  const coin = document.getElementById('coin');
  const result = document.getElementById('result');
  const flipBtn = document.getElementById('flipBtn');

  function playSound() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    oscillator.type = 'square';
    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
    oscillator.connect(audioCtx.destination);
    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.1);
  }

  flipBtn.addEventListener('click', () => {
    result.textContent = '';
    coin.classList.remove('flip');

    setTimeout(() => {
      coin.classList.add('flip');
      playSound();

      setTimeout(() => {
        const choice = Math.random() < 0.5 ? 'Heads' : 'Tails';
        coin.style.transform = choice === 'Heads' ? 'rotateY(0deg)' : 'rotateY(180deg)';
        result.textContent = choice;
        playSound();
      }, 3000);
    }, 100);
  });

  // Service Worker registration for offline
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(() => console.log('Service Worker registered'))
      .catch(err => console.log('SW registration failed', err));
  }
</script>

</body>
  </html>
